<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0b1847;
      --navy-deep:  #080f30;
      --blue:       #1d44d4;
      --blue-mid:   #3660f0;
      --blue-lite:  #eef1fd;
      --blue-soft:  #dce3fb;
      --text:       #0d1226;
      --text-sub:   #4b5580;
      --text-muted: #8d96bb;
      --bg:         #f4f6fb;
      --white:      #ffffff;
      --border:     #dde2f0;
      --border-dark:rgba(255,255,255,0.09);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--blue-mid);
      z-index: 600;
      width: 0%;
      transition: width 0.08s linear;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 500;
      background: rgba(244,246,251,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 56px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo-mark {
      width: 28px; height: 28px;
      background: var(--navy);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-logo-mark svg {
      width: 14px; height: 14px;
      fill: none; stroke: white;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .nav-logo-text {
      font-weight: 800;
      font-size: 0.875rem;
      letter-spacing: -0.02em;
      color: var(--navy);
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .lang-switch { display: flex; align-items: center; gap: 2px; }
    .lang-btn {
      border: none;
      background: transparent;
      padding: 6px 11px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
      border-radius: 6px;
    }
    .lang-btn.active { color: var(--blue); background: var(--blue-lite); }
    .lang-sep { width: 1px; height: 12px; background: var(--border); margin: 0 2px; }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      background: var(--navy);
      color: white;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 9px 18px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .nav-cta:hover { background: var(--blue); transform: translateY(-1px); }

    .hero {
      background: var(--navy);
      position: relative;
      overflow: hidden;
      padding: 0 56px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .hero-glow {
      position: absolute;
      top: -20%; right: -5%;
      width: 60%; height: 120%;
      background: radial-gradient(ellipse at 60% 40%, rgba(61,100,240,0.28) 0%, transparent 65%);
      pointer-events: none;
      animation: glow 14s ease-in-out infinite alternate;
    }
    @keyframes glow {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(-5%,5%) scale(1.2); }
    }
    .hero-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 108px 0 0;
      position: relative;
      z-index: 1;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 16px 6px 10px;
      margin-bottom: 36px;
      opacity: 0;
      animation: rise 0.7s ease 0.1s forwards;
    }
    .hero-badge-dot { width: 6px; height: 6px; background: #4a8cff; border-radius: 50%; }
    .hero-badge span {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
    }
    .hero-h1 {
      font-weight: 800;
      font-size: clamp(2.8rem, 7vw, 6.5rem);
      line-height: 1.0;
      letter-spacing: -0.04em;
      color: #ffffff;
      max-width: 760px;
      opacity: 0;
      animation: rise 0.8s ease 0.25s forwards;
    }
    .hero-h1 .hl { color: #6b9fff; }
    .hero-sub {
      margin-top: 32px;
      max-width: 520px;
      opacity: 0;
      animation: rise 0.8s ease 0.42s forwards;
    }
    .hero-sub p {
      font-size: 0.975rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
    }
    .hero-sub p + p { margin-top: 12px; }
    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 48px;
      padding-bottom: 72px;
      border-bottom: 1px solid var(--border-dark);
      opacity: 0;
      animation: rise 0.8s ease 0.58s forwards;
    }
    .hero-pill {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 14px;
    }
    .hero-strip {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      position: relative;
      z-index: 1;
    }
    .hero-stat {
      padding: 28px 0;
      border-right: 1px solid var(--border-dark);
      opacity: 0;
      animation: rise 0.7s ease 0.72s forwards;
    }
    .hero-stat:not(:first-child) { padding-left: 40px; }
    .hero-stat:last-child { border-right: none; }
    .hero-stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .hero-stat-val {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.01em;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }

    .section-wrap { max-width: 1120px; margin: 0 auto; }
    .s-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--blue-lite);
      padding: 5px 12px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .s-title {
      font-weight: 800;
      font-size: clamp(1.9rem, 4vw, 3rem);
      letter-spacing: -0.035em;
      color: var(--navy);
      line-height: 1.05;
      margin-bottom: 56px;
    }

    .expertise {
      padding: 112px 56px;
      background: var(--white);
      border-top: 1px solid var(--border);
    }
    .exp-rows { display: flex; flex-direction: column; }
    .exp-row {
      display: grid;
      grid-template-columns: 56px 1fr 1fr;
      gap: 0 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s, padding 0.2s, margin 0.2s;
      position: relative;
    }
    .exp-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--blue);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
      border-radius: 2px;
    }
    .exp-row:first-child { border-top: 1px solid var(--border); }
    .exp-row:hover { background: var(--bg); margin: 0 -56px; padding: 36px 56px; }
    .exp-row:hover::before { transform: scaleY(1); }
    .exp-n {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      padding-top: 3px;
    }
    .exp-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1.3;
      padding-top: 2px;
    }
    .exp-desc {
      font-size: 0.875rem;
      color: var(--text-sub);
      line-height: 1.72;
    }

    .why {
      padding: 112px 56px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .why-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }
    .why-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      grid-column: span 2;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .why-card.large {
      grid-column: span 3;
      padding: 40px 36px;
    }
    .why-card:hover {
      border-color: var(--blue-soft);
      box-shadow: 0 4px 24px rgba(29,68,212,0.08);
      transform: translateY(-2px);
    }
    .why-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--blue-lite);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .why-card.large .why-icon { width: 48px; height: 48px; border-radius: 12px; margin-bottom: 24px; }
    .why-icon svg { width: 18px; height: 18px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .why-card.large .why-icon svg { width: 20px; height: 20px; }
    .why-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.015em;
      line-height: 1.35;
    }
    .why-card.large .why-card-title { font-size: 1.05rem; margin-bottom: 10px; }
    .why-card-desc {
      font-size: 0.825rem;
      color: var(--text-sub);
      line-height: 1.7;
      margin-top: 8px;
    }

    .cta-section {
      padding: 112px 56px;
      background: var(--white);
      border-top: 1px solid var(--border);
    }
    .cta-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .cta-title {
      font-weight: 800;
      font-size: clamp(1.9rem, 4vw, 3rem);
      letter-spacing: -0.04em;
      color: var(--navy);
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .cta-desc {
      font-size: 0.975rem;
      color: var(--text-sub);
      line-height: 1.75;
    }
    .cta-right { display: flex; flex-direction: column; gap: 16px; }
    .cta-email-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--navy);
      color: white;
      padding: 16px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      transition: background 0.2s, transform 0.15s;
    }
    .cta-email-link:hover { background: var(--blue); transform: translateY(-2px); }
    .cta-email-link svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .cta-note {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }

    .tagline {
      padding: 128px 56px;
      background: var(--navy-deep);
      border-top: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .tagline::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .tagline-inner { max-width: 1120px; margin: 0 auto; position: relative; z-index: 1; }
    .tagline p {
      font-weight: 800;
      font-size: clamp(1.8rem, 4.5vw, 3.6rem);
      letter-spacing: -0.04em;
      color: #ffffff;
      max-width: 820px;
      line-height: 1.1;
    }
    .tagline p span { color: #6b9fff; }
    .tagline-sub {
      margin-top: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.38);
    }

    footer {
      background: #060c22;
      padding: 36px 56px;
    }
    .footer-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    .footer-copy { font-size: 0.78rem; font-weight: 500; color: rgba(255,255,255,0.25); }
    .footer-links { display: flex; gap: 28px; }
    .footer-links a {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: rgba(255,255,255,0.75); }

    @media (max-width: 960px) {
      nav { padding: 0 24px; }
      .hero { padding: 0 24px; }
      .expertise, .why, .cta-section, .tagline { padding-left: 24px; padding-right: 24px; }
      footer { padding-left: 24px; padding-right: 24px; }
      .hero-strip { grid-template-columns: 1fr 1fr; }
      .hero-stat:nth-child(2) { border-right: none; }
      .hero-stat:nth-child(3) { border-top: 1px solid var(--border-dark); padding-left: 0; grid-column: 1 / -1; }
      .exp-row:hover { margin: 0 -24px; padding: 36px 24px; }
      .why-card.large { grid-column: span 3; }
      .why-card { grid-column: span 3; }
      .cta-inner { grid-template-columns: 1fr; gap: 48px; }
      .nav-cta { display: none; }
    }

    @media (max-width: 680px) {
      .hero-strip { grid-template-columns: 1fr; }
      .hero-stat { border-right: none !important; border-bottom: 1px solid var(--border-dark); padding-left: 0 !important; }
      .hero-stat:last-child { border-bottom: none; }
      .exp-row { grid-template-columns: 36px 1fr; }
      .exp-desc { grid-column: 2; margin-top: 8px; }
      .exp-row:hover { margin: 0 -24px; padding: 28px 24px; }
      .why-card, .why-card.large { grid-column: 1 / -1; }
      .hero-h1 { letter-spacing: -0.03em; }
      .hero-inner { padding-top: 80px; }
      .hero-pills { padding-bottom: 52px; }
      .expertise, .why, .cta-section { padding-top: 80px; padding-bottom: 80px; }
      .tagline { padding-top: 80px; padding-bottom: 80px; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progress"></div>

  <nav>
    <a class="nav-logo" href="#">
      <div class="nav-logo-mark">
        <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      </div>
      <span class="nav-logo-text">ATL Brazil LTDA</span>
    </a>
    <div class="nav-right">
      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('en')" id="btn-en">🇺🇸 EN</button>
        <div class="lang-sep"></div>
        <button class="lang-btn" onclick="setLang('pt')" id="btn-pt">🇧🇷 PT</button>
      </div>
      <a href="#contact" class="nav-cta" data-t="navCta"></a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="hero-inner">
      <div class="hero-badge">
        <div class="hero-badge-dot"></div>
        <span>ATL Brazil</span>
      </div>
      <h1 class="hero-h1" data-t="heroTitle"></h1>
      <div class="hero-sub">
        <p data-t="heroPara1"></p>
        <p data-t="heroPara2"></p>
      </div>
      <div class="hero-pills">
        <div class="hero-pill" data-t="pill1"></div>
        <div class="hero-pill" data-t="pill2"></div>
        <div class="hero-pill" data-t="pill3"></div>
        <div class="hero-pill" data-t="pill4"></div>
      </div>
    </div>
    <div class="hero-strip">
      <div class="hero-stat">
        <div class="hero-stat-label" data-t="stat1label"></div>
        <div class="hero-stat-val" data-t="stat1val"></div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label" data-t="stat2label"></div>
        <div class="hero-stat-val" data-t="stat2val"></div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label" data-t="stat3label"></div>
        <div class="hero-stat-val" data-t="stat3val"></div>
      </div>
    </div>
  </section>

  <section class="expertise">
    <div class="section-wrap">
      <div class="reveal">
        <div class="s-tag" data-t="expTag"></div>
        <h2 class="s-title" data-t="expTitle"></h2>
      </div>
      <div class="exp-rows">
        <div class="exp-row reveal">
          <div class="exp-n">01</div>
          <div class="exp-name" data-t="exp1name"></div>
          <div class="exp-desc" data-t="exp1desc"></div>
        </div>
        <div class="exp-row reveal" style="transition-delay:.07s">
          <div class="exp-n">02</div>
          <div class="exp-name" data-t="exp2name"></div>
          <div class="exp-desc" data-t="exp2desc"></div>
        </div>
        <div class="exp-row reveal" style="transition-delay:.13s">
          <div class="exp-n">03</div>
          <div class="exp-name" data-t="exp3name"></div>
          <div class="exp-desc" data-t="exp3desc"></div>
        </div>
        <div class="exp-row reveal" style="transition-delay:.19s">
          <div class="exp-n">04</div>
          <div class="exp-name" data-t="exp4name"></div>
          <div class="exp-desc" data-t="exp4desc"></div>
        </div>
        <div class="exp-row reveal" style="transition-delay:.25s">
          <div class="exp-n">05</div>
          <div class="exp-name" data-t="exp5name"></div>
          <div class="exp-desc" data-t="exp5desc"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="why">
    <div class="section-wrap">
      <div class="reveal">
        <div class="s-tag" data-t="whyTag"></div>
        <h2 class="s-title" data-t="whyTitle"></h2>
      </div>
      <div class="why-grid">
        <div class="why-card large reveal">
          <div class="why-icon">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="why-card-title" data-t="why1"></div>
          <div class="why-card-desc" data-t="why1desc"></div>

    document.getElementById('yr').textContent = new Date().getFullYear();

    function setLang(lang) {
      const d = T[lang] || T.en;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-t]').forEach(el => {
        const val = d[el.dataset.t] ?? T.en[el.dataset.t] ?? '';
        if (val.includes('<') || val.includes('\n')) {
          el.innerHTML = val.replace(/\n/g, '<br>');
        } else {
          el.textContent = val;
        }
      });
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-pt').classList.toggle('active', lang === 'pt');
      localStorage.setItem('lang', lang);
    }

    const saved = localStorage.getItem('lang') || (navigator.language.startsWith('pt') ? 'pt' : 'en');
    setLang(saved);

    const bar = document.getElementById('progress');
    window.addEventListener('scroll', () => {
      bar.style.width = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100) + '%';
    }, { passive: true });

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
