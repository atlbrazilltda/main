<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — ATL Brazil LTDA</title>
  <meta name="description" content="Privacy Policy for ATL Brazil LTDA." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://atlbrazil.online/privacy.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0b1847;
      --blue: #1d44d4;
      --blue-lite: #eef1fd;
      --text: #0d1226;
      --text-muted: #8d96bb;
      --border: #dde2f0;
      --bg: #f4f6fb;
      --white: #ffffff;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 56px;
    }
    .nav-inner {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-weight: 800;
      font-size: 0.875rem;
      letter-spacing: -0.02em;
      color: var(--navy);
      text-decoration: none;
    }
    .back-link {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--navy); }
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 64px 56px 96px;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.04em;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .meta {
      font-size: 0.825rem;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 18px 22px;
      font-size: 0.875rem;
      color: #92400e;
      line-height: 1.6;
    }
    @media (max-width: 680px) {
      nav { padding: 0 20px; }
      main { padding: 48px 20px 72px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">ATL Brazil LTDA</a>
      <a class="back-link" href="index.html">← Back</a>
    </div>
  </nav>
  <main>
    <h1>Privacy Policy</h1>
    <p class="meta">Last updated: <span id="date"></span></p>
    <div class="notice">
      This page is pending legal review. Full Privacy Policy will be published here shortly.
    </div>
  </main>
  <script>
    document.getElementById('date').textContent = new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
  </script>
</body>
</html>
